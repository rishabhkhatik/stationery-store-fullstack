<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your one-stop stationery and gift store — pencils, notebooks, return gifts and more." />
    <meta name="theme-color" content="#e84393" />
    <title>Crifts</title>
    <style>
      #app-loading {
        position: fixed; inset: 0; background: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; font-family: Inter, sans-serif;
        transition: opacity 0.3s ease;
      }
      #app-loading .logo-text {
        font-size: 32px; font-weight: 800;
        color: #e84393; letter-spacing: -0.5px;
      }
      #app-loading .tagline {
        font-size: 13px; color: #999; margin-top: 6px;
      }
      #app-loading .spinner {
        width: 36px; height: 36px;
        border: 3px solid #f9e0ef;
        border-top-color: #e84393;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-top: 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css" />
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css" />
    <!-- hCaptcha FREE - test key works without account -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <!-- EmailJS FREE - 200 emails/month -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  </head>
  <body>
    <div id="app-loading">
      <div class="logo-text">Crifts</div>
      <div class="tagline">Return gifts, fancy stationery &amp; hampers</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
